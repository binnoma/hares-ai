<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="shieldSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M 18 16 Q 12 16 12 23 L 12 60 Q 12 94 64 122 Q 116 94 116 60 L 116 23 Q 116 16 110 16 Z"
        fill="url(#shieldGrad)"/>

  <!-- Shield sheen overlay -->
  <path d="M 18 16 Q 12 16 12 23 L 12 60 Q 12 94 64 122 Q 116 94 116 60 L 116 23 Q 116 16 110 16 Z"
        fill="url(#shieldSheen)"/>

  <!-- Inner border -->
  <path d="M 20 22 Q 17 22 17 25 L 17 59 Q 17 90 64 116 Q 111 90 111 59 L 111 25 Q 111 22 108 22 Z"
        fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Eye glow aura -->
  <ellipse cx="64" cy="62" rx="32" ry="24" fill="url(#eyeGlow)"/>

  <!-- Eye shape - upper lid -->
  <path d="M 30 62 Q 47 36 64 36 Q 81 36 98 62"
        fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Eye shape - lower lid -->
  <path d="M 30 62 Q 47 88 64 88 Q 81 88 98 62"
        fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Eye fill (subtle) -->
  <path d="M 30 62 Q 47 36 64 36 Q 81 36 98 62 Q 81 88 64 88 Q 47 88 30 62 Z"
        fill="#ffffff" fill-opacity="0.1"/>

  <!-- Iris outer ring -->
  <circle cx="64" cy="62" r="14" fill="#ffffff" fill-opacity="0.92"/>

  <!-- Iris colored ring -->
  <circle cx="64" cy="62" r="10.5" fill="url(#irisGrad)"/>

  <!-- Iris detail ring -->
  <circle cx="64" cy="62" r="10.5" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="0.8"/>

  <!-- Pupil -->
  <circle cx="64" cy="62" r="5" fill="#022c22"/>

  <!-- Pupil highlight (large) -->
  <circle cx="60" cy="58" r="2.5" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Pupil highlight (small) -->
  <circle cx="67" cy="66" r="1.2" fill="#ffffff" fill-opacity="0.5"/>

  <!-- Scan crosshair lines -->
  <line x1="64" y1="28" x2="64" y2="22" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="96" x2="64" y2="102" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="62" x2="18" y2="62" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="62" x2="110" y2="62" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round"/>

  <!-- Diagonal scan accents -->
  <line x1="39" y1="40" x2="35" y2="36" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="89" y1="40" x2="93" y2="36" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="39" y1="84" x2="35" y2="88" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="89" y1="84" x2="93" y2="88" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
</svg>
